version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: wsms_postgres
    environment:
      POSTGRES_USER: wsms
      POSTGRES_PASSWORD: wsms_dev_pass
      POSTGRES_DB: wsms_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wsms -d wsms_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wsms_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wsms:wsms_dev_pass@postgres:5432/wsms_dev
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
